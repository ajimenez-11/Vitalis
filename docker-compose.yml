services:
  # BASE DE DADES
  db:
    image: mysql:8.0
    container_name: vitalis_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - vitalis_net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # BACKEND — Laravel
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: vitalis_backend
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./backend:/var/www
    ports:
      - "8000:8000"
    environment:
      APP_ENV: ${APP_ENV}
      APP_DEBUG: ${APP_DEBUG}
      APP_KEY: ${APP_KEY}
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      RUTA_RECEPTES: uploads/imatges/receptes
    depends_on:
      db:
        condition: service_healthy
    networks:
      - vitalis_net
    command: >
      sh -c "
        composer install --no-interaction &&
        php artisan key:generate --ansi &&
        php artisan vendor:publish --provider='Illuminate\\Http\\Middleware\\HandleCors' --force &&
        php artisan migrate --force &&
        php artisan tinker --execute=\"if(\\App\\Models\\User::count() == 0) { \\Artisan::call('db:seed', ['--force' => true]); echo 'Seeded'; } else { echo 'Skip seed'; }\" &&
        php artisan serve --host=0.0.0.0 --port=8000
      "

  # FRONTEND — React + Tailwind
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: vitalis_frontend
    restart: unless-stopped
    working_dir: /app
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: ${VITE_API_URL}
    depends_on:
      - backend
    networks:
      - vitalis_net

# VOLUMS I XARXA
volumes:
  db_data:

networks:
  vitalis_net:
    driver: bridge